<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = 'https://lfaldubbsvvndymeveok.supabase.co';
const supabaseKey = 'sb_publishable_VERAJLcNy-2AobFmaaNDVQ_lc6Hcdzx';

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

// =====================
// デイリーランキング
// =====================
async function loadDaily() {

  const { data, error } = await client
    .from('games')
    .select(`
      score,
      player_id,
      players (
        name
      )
    `);

  console.log('daily', data);

  if (error) {
    console.log(error);
    return;
  }

  renderRanking(
    'daily-ranking',
    data,
    3
  );
}

// =====================
// 月間ランキング
// =====================
async function loadMonthly() {

  const { data, error } = await client
    .from('games')
    .select(`
      score,
      player_id,
      players (
        name
      )
    `);

  console.log('monthly', data);

  if (error) {
    console.log(error);
    return;
  }

  renderRanking(
    'monthly-ranking',
    data,
    5
  );
}

// =====================
// ランキング描画
// =====================
function renderRanking(
  elementId,
  data,
  limit
) {

  const table =
    document.getElementById(elementId);

  table.innerHTML = '';

  const scoreMap = {};

  data.forEach(row => {

    if (!row.players) return;

    const name = row.players.name;

    scoreMap[name] =
      (scoreMap[name] || 0)
      + row.score;
  });

  const sorted = Object.entries(scoreMap)
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit);

  sorted.forEach((item, index) => {

    table.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${item[0]}</td>
        <td>${item[1]}</td>
      </tr>
    `;
  });
}

// =====================
// ログイン処理
// =====================
async function login() {

  const loginId =
    document.getElementById('login-id').value;

  const password =
    document.getElementById('password').value;

  const { data: player, error } =
    await client
      .from('players')
      .select('*')
      .eq('login_id', loginId)
      .eq('password', password)
      .single();

  console.log(player);
  console.log(error);

  if (error || !player) {

    alert('ログイン失敗');

    return;
  }

  loadMyPage(player);
}

// =====================
// 個人成績
// =====================
async function loadMyPage(player) {

  const { data, error } =
    await client
      .from('games')
      .select('*')
      .eq('player_id', player.id);

  if (error) {
    console.log(error);
    return;
  }

  const games = data.length;

  const totalScore =
    data.reduce((sum, row) => {
      return sum + row.score;
    }, 0);

  const avgRank = (
    data.reduce((sum, row) => {
      return sum + row.rank;
    }, 0) / games
  ).toFixed(2);

  const rank1 =
    data.filter(x => x.rank === 1).length;

  const rank2 =
    data.filter(x => x.rank === 2).length;

  const rank3 =
    data.filter(x => x.rank === 3).length;

  const rank4 =
    data.filter(x => x.rank === 4).length;

  // 全員ランキング
  const { data: allGames } =
    await client
      .from('games')
      .select(`
        score,
        player_id,
        players (
          name
        )
      `);

  const map = {};

  allGames.forEach(row => {

    if (!row.players) return;

    const name = row.players.name;

    if (!map[row.player_id]) {

      map[row.player_id] = {
        name: name,
        total: 0
      };
    }

    map[row.player_id].total += row.score;
  });

  const ranking =
    Object.entries(map)
      .sort((a, b) => {
        return b[1].total - a[1].total;
      });

  const myRank =
    ranking.findIndex(x => {
      return x[0] === player.id;
    }) + 1;

  document.getElementById('my-result')
    .innerHTML = `

    <table>
      <thead>
        <tr>
          <th>順位</th>
          <th>名前</th>
          <th>対局数</th>
          <th>平均順位</th>
          <th>成績</th>
          <th>総スコア</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>${myRank}</td>
          <td>${player.name}</td>
          <td>${games}</td>
          <td>${avgRank}</td>
          <td>${rank1}-${rank2}-${rank3}-${rank4}</td>
          <td>${totalScore}</td>
        </tr>
      </tbody>
    </table>
  `;
}

// 実行
loadDaily();
loadMonthly();

</script>
