<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀 A&B | 初心者歓迎ノーレート雀荘</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans JP', sans-serif;
    margin: 0;
    background-color: #f4f4f4;
    color: #2b2b2b;
    line-height: 1.8;
}

/* ナビ */
nav {
    background-color: rgba(255, 255, 255, 0.9);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
}

.menu { display: flex; gap: 30px; }

nav a {
    color: #6aa7d8;
    text-decoration: none;
    font-weight: bold;
}

/* ヒーロー */
.hero {
    height: 50vh;
    background: url("https://ringo1033.github.io/test001/34165010_l.jpg") center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.hero h1 { font-size: 40px; }

/* セクション */
section {
    padding: 60px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 { text-align: center; }

/* カード */
.cards {
    display: grid;
    gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* ===== ランキングテーブル ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

th {
  background: #27ae60;
  color: white;
}

tr:nth-child(even) {
  background: #f9f9f9;
}

.first {
  background: #ffeaa7;
  font-weight: bold;
}

/* フッター */
footer {
    text-align: center;
    padding: 20px;
    background: #27ae60;
    color: white;
}
</style>
</head>

<body>

<nav>
    <div>麻雀 A&B</div>
    <div class="menu">
        <a href="#紹介">紹介</a>
        <a href="#料金">料金</a>
        <a href="#ランキング">ランキング</a>
    </div>
</nav>

<div class="hero">
    <h1>初心者歓迎のノーレート雀荘</h1>
</div>

<section id="紹介">
    <h2>当店の紹介</h2>
    <p style="text-align:center;">
        初めてでも安心して楽しめる麻雀店です。
    </p>
</section>

<section id="料金">
    <h2>料金</h2>
    <p style="text-align:center;">1ゲーム 500円</p>
</section>

<!-- ★ここが修正ポイント -->
<section id="ランキング">
<h2>ランキング</h2>

<table>
  <thead>
    <tr>
      <th>順位</th>
      <th>名前</th>
      <th>対局数</th>
      <th>平均順位</th>
      <th>成績</th>
      <th>総スコア</th>
    </tr>
  </thead>
  <tbody id="ranking"></tbody>
</table>

</section>

<footer>
    © 2026 麻雀 A&B
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseUrl = 'https://lfaldubbsvvndymeveok.supabase.co';
const supabaseKey = 'あなたのanonキー'; // ←ここだけ入れ替え

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function loadRanking() {
  const { data, error } = await client
    .from('rankings')
    .select('*')
    .order('total_score', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const table = document.getElementById('ranking');
  table.innerHTML = '';

  data.forEach((row, index) => {
    const cls = index === 0 ? 'first' : '';

    table.innerHTML += `
      <tr class="${cls}">
        <td>${index + 1}</td>
        <td>${row.name}</td>
        <td>${row.games ?? 0}</td>
        <td>${row.avg_rank ?? '-'}</td>
        <td>${row.rank_detail ?? '0-0-0-0'}</td>
        <td>${row.total_score ?? 0}</td>
      </tr>
    `;
  });
}

loadRanking();
</script>

</body>
</html>
